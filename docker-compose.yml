services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beyond}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beyond}
      POSTGRES_DB: ${POSTGRES_DB:-beyond}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
